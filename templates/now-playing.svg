<!-- Skeleton reference for the now-playing widget.

This is a human-readable layout sketch. lib/svg_generator.py produces the
actual SVG programmatically from a track dict; keep this file in sync with
the generator's geometry as the design evolves (Phase 5 polish).

viewBox: 0 0 480 160
+----------------------------------------------------+
|  (16,16)                                    [eq]   |
|  +--------+   NOW PLAYING  / LAST PLAYED            |
|  |        |   Track Name (bold)                     |
|  |  art   |   Artist                                 |
|  | 128px  |   3 min ago   (last played only)         |
|  +--------+                                          |
|                                                    |
+----------------------------------------------------+
-->
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160" role="img" aria-label="Last.fm now playing skeleton">
  <rect width="480" height="160" rx="12" ry="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="16" y="16" width="128" height="128" rx="8" ry="8" fill="#30363d"/>
  <text x="162" y="42" fill="#3fb950" font-size="11" letter-spacing="1.5" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">NOW PLAYING</text>
  <text x="162" y="72" fill="#e6edf3" font-size="19" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Like Water</text>
  <text x="162" y="96" fill="#8b949e" font-size="14" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Flume</text>
</svg>
